<!DOCTYPE html>
<html lang="ja">
<head>

<title>SAGRADO.</title>

<style>
body {
  margin: 0;
  font-family: Helvetica, Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* タイトル */
h1 {
  text-align: center;
  padding: 40px 20px;
  font-size: 28px;
  letter-spacing: 4px;
}

/* グリッド */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
  padding: 20px;
}

/* 商品 */
.product {
  background: #111;
  padding: 20px;
  text-align: center;
  transition: 0.3s;
  border: 1px solid #222;
}

.product:hover {
  transform: translateY(-5px);
}

/* 画像 */
.product img {
  width: 100%;
  height: auto;
}

/* タイトル */
.product h2 {
  margin: 15px 0 5px;
  font-size: 16px;
  letter-spacing: 2px;
}

/* 価格 */
.product p {
  color: #aaa;
  margin: 5px 0 15px;
}

/* ボタン */
.product a {
  display: inline-block;
  padding: 10px 20px;
  border: 1px solid #fff;
  color: #fff;
  text-decoration: none;
  font-size: 12px;
  letter-spacing: 2px;
}

.product a:hover {
  background: #fff;
  color: #000;
}

footer {
  text-align: center;
  padding: 40px;
  font-size: 12px;
  color: #666;
}
</style>
</head>

<body>

<h1>SAGRADO.</h1>

  <div class="product">
